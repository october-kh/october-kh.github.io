<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #333333;
      background: #f4f0ea;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-left: 10%;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08)),
        url("/Users/sophannaryvin/Desktop/Screenshot 2026-05-14 at 1.24.54 in the afternoon.png");
      background-size: cover;
      background-position: left center;
    }

    .message-box {
      width: min(540px, 80vw);
      padding: 70px 40px 55px;
      background: rgba(255, 255, 255, 0.78);
    }

    .line {
      width: 100px;
      height: 3px;
      margin-bottom: 18px;
      background: #222222;
    }

    h1 {
      max-width: 440px;
      margin-bottom: 18px;
      font-size: 31px;
      font-weight: 400;
      line-height: 1.22;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    p {
      max-width: 470px;
      margin-bottom: 26px;
      font-size: 18px;
      line-height: 1.48;
    }

    p:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 700px) {
      .hero {
        align-items: flex-end;
        padding: 28px;
        background-position: center;
      }

      .message-box {
        width: 100%;
        padding: 42px 26px 34px;
      }

      h1 {
        font-size: 27px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <section class="message-box">
      <div class="line"></div>
      <h1>Everyone Has Potential To Be Great.</h1>
      <p>
        I believe that each of us has a special reason for being here on Earth.
        We all have unique gifts and talents that we're meant to discover,
        nurture, and share with the world during our lifetime.
      </p>
      <p>I believe that everyone has potential to be great.</p>
    </section>
  </main>
</body>
</html>
